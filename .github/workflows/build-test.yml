name: Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint minimal/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: minimal/Dockerfile

      - name: Lint full/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: full/Dockerfile

  build-and-test:
    name: Build & Test (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: minimal
            dockerfile: minimal/Dockerfile
            tag: tika:test-minimal
            start_period: 30
          - variant: full
            dockerfile: full/Dockerfile
            tag: tika:test-full
            start_period: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.variant }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: TIKA_VERSION=3.2.3
          tags: ${{ matrix.tag }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d --name tika-test \
            --read-only \
            --tmpfs /tmp \
            -p 9998:9998 \
            ${{ matrix.tag }}

      - name: Wait for Tika to become ready
        run: |
          echo "Waiting up to ${{ matrix.start_period }}s for Tika to start..."
          for i in $(seq 1 ${{ matrix.start_period }}); do
            if curl -sf http://localhost:9998/version > /dev/null 2>&1; then
              echo "Tika is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Tika did not become ready in time"
          docker logs tika-test
          exit 1

      - name: Verify Tika version response
        run: |
          VERSION=$(curl -sf http://localhost:9998/version)
          echo "Version response: ${VERSION}"
          echo "${VERSION}" | grep -q "3.2.3"

      - name: Verify non-root execution
        run: |
          UID_OUT=$(docker exec tika-test id)
          echo "Container identity: ${UID_OUT}"
          echo "${UID_OUT}" | grep -q "uid=35002(tika)"

      - name: Stop and remove container
        if: always()
        run: docker stop tika-test && docker rm tika-test

  trivy-scan:
    name: Trivy Scan (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: minimal
            dockerfile: minimal/Dockerfile
            tag: tika:scan-minimal
          - variant: full
            dockerfile: full/Dockerfile
            tag: tika:scan-full

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.variant }} image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: TIKA_VERSION=3.2.3
          tags: ${{ matrix.tag }}
          load: true
          cache-from: type=gha

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.tag }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
